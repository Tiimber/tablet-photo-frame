<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slideshow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: row;
    opacity: 0;
  }
  .slide.stacked { flex-direction: column; }

  .media-item {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }
  .media-item + .media-item { margin-left: 2px; }
  .slide.stacked .media-item + .media-item { margin-left: 0; margin-top: 2px; }

  .media-item img,
  .media-item video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .date-label {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #fff;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    pointer-events: none;
    z-index: 10;
    letter-spacing: 0.04em;
  }
  body.fit-contain .media-item img,
  body.fit-contain .media-item video { object-fit: contain; }
  .media-item video.portrait { object-fit: contain; }

  @keyframes kb1 { from { transform: scale(1.0) translate(0,0); }    to { transform: scale(1.15) translate(-2%,-2%); } }
  @keyframes kb2 { from { transform: scale(1.1) translate(-1%,1%); } to { transform: scale(1.0)  translate(2%,-1%); } }
  @keyframes kb3 { from { transform: scale(1.0) translate(1%,-1%); } to { transform: scale(1.12) translate(-1%,2%); } }

  #empty {
    display: none;
    position: absolute;
    inset: 0;
    color: #fff;
    font-family: sans-serif;
    font-size: 1.4rem;
    text-align: center;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    opacity: 0.6;
  }
  #empty.visible { display: flex; }

  #counter {
    position: fixed;
    bottom: 12px;
    right: 16px;
    color: rgba(255,255,255,0.35);
    font-family: sans-serif;
    font-size: 0.85rem;
    pointer-events: none;
    z-index: 99;
  }

  /* Canvas for advanced transitions */
  #fx-canvas {
    position: absolute;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
  }
  #fx-canvas.active { opacity: 1; }

  /* Settings overlay */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #settings-overlay.open { display: flex; }

  #settings-panel {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 28px 32px;
    width: min(420px, 90vw);
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }
  #settings-panel h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #ddd;
    margin-bottom: 22px;
    letter-spacing: 0.04em;
  }
  #settings-panel .s-close {
    position: absolute;
    top: 16px; right: 18px;
    background: none; border: none;
    color: #555; font-size: 1.5rem; cursor: pointer; line-height: 1;
  }
  #settings-panel .s-close:hover { color: #ccc; }

  .s-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }
  .s-row label { font-size: 0.88rem; color: #aaa; flex-shrink: 0; }
  .s-row select, .s-row input[type=number] {
    background: #252525; border: 1px solid #3a3a3a; color: #ddd;
    font-size: 0.85rem; padding: 6px 10px; border-radius: 6px;
    outline: none; flex: 1; min-width: 0;
  }
  .s-row select:focus, .s-row input[type=number]:focus { border-color: #4a9eff; }

  .s-toggle { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
  .s-toggle input { opacity: 0; width: 0; height: 0; }
  .s-toggle-track {
    position: absolute; inset: 0;
    background: #333; border-radius: 12px; cursor: pointer; transition: background 0.2s;
  }
  .s-toggle input:checked + .s-toggle-track { background: #2d7abf; }
  .s-toggle-track::after {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 9px;
    background: #fff; top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  .s-toggle input:checked + .s-toggle-track::after { transform: translateX(18px); }

  #settings-panel .s-interval-val {
    font-size: 0.8rem; color: #666; min-width: 36px; text-align: right;
  }
  #settings-panel .s-save {
    width: 100%; margin-top: 20px; padding: 10px;
    background: #1a4a7a; border: 1px solid #2d7abf; color: #aad4ff;
    font-size: 0.95rem; font-weight: 600; border-radius: 8px; cursor: pointer;
  }
  #settings-panel .s-save:hover { background: #1e5a96; }

  #settings-panel .s-resume {
    width: 100%;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    margin-bottom: 12px;
    display: none;
  }
  #settings-panel .s-resume:hover { background: #218838; }
  #settings-panel.paused .s-resume { display: block; }

  #settings-panel .s-hint {
    font-size: 0.7rem; color: #444; text-align: center; margin-top: 12px;
  }

  /* Settings layout wrapper — arranges settings panel + info panels */
  #settings-layout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    max-width: 98vw;
    max-height: 96vh;
  }
  #settings-layout.layout-col {
    flex-direction: column;
  }

  /* Per-media info panels */
  .info-panel {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 140px;
    flex-shrink: 0;
  }
  .info-panel-thumb {
    width: 116px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    background: #111;
    display: block;
  }
  .info-panel-name {
    font-size: 0.72rem;
    color: #888;
    text-align: center;
    word-break: break-all;
    max-width: 116px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .info-panel-manage {
    width: 100%;
    padding: 7px 0;
    background: #1a4a7a;
    border: 1px solid #2d7abf;
    color: #aad4ff;
    font-size: 0.82rem;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    text-align: center;
  }
  .info-panel-manage:hover { background: #1e5a96; }

  /* Auto-close countdown bar */
  #settings-countdown {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: #2d7abf;
    border-radius: 0 0 14px 14px;
    transform-origin: left center;
    transition: transform 1s linear;
  }

  /* Manage modal */
  #manage-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #manage-modal.open { display: flex; }

  #manage-panel {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    width: min(420px, 92vw);
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  #manage-img-wrap {
    width: 100%;
    height: 25vh;
    min-height: 120px;
    background: #111;
    border-radius: 14px 14px 0 0;
    overflow: hidden;
    flex-shrink: 0;
  }
  #manage-img-wrap img,
  #manage-img-wrap video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  #manage-body {
    padding: 20px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #manage-panel .m-close {
    position: absolute;
    top: 10px; right: 14px;
    background: rgba(0,0,0,0.55); border: none;
    color: #ccc; font-size: 1.4rem; cursor: pointer; line-height: 1;
    border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }
  #manage-panel .m-close:hover { color: #fff; background: rgba(0,0,0,0.8); }

  .m-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .m-row label {
    font-size: 0.82rem;
    color: #888;
    min-width: 72px;
    flex-shrink: 0;
  }
  .m-row span {
    font-size: 0.88rem;
    color: #ccc;
  }
  .m-row input[type=text] {
    flex: 1;
    background: #252525;
    border: 1px solid #3a3a3a;
    color: #ddd;
    font-size: 0.88rem;
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
  }
  .m-row input[type=text]:focus { border-color: #4a9eff; }

  .m-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .m-btn-save {
    flex: 1;
    padding: 9px;
    background: #1a4a7a;
    border: 1px solid #2d7abf;
    color: #aad4ff;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
  }
  .m-btn-save:hover { background: #1e5a96; }
  .m-btn-delete {
    padding: 9px 16px;
    background: #5a1a1a;
    border: 1px solid #bf2d2d;
    color: #ffaaaa;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
  }
  .m-btn-delete:hover { background: #7a2020; }

  /* Confirm delete dialog */
  #delete-confirm {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 3000;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #delete-confirm.open { display: flex; }
  #delete-confirm-box {
    background: #1e1e1e;
    border: 1px solid #3a3a3a;
    border-radius: 12px;
    padding: 28px 32px;
    width: min(340px, 88vw);
    text-align: center;
  }
  #delete-confirm-box p {
    color: #ccc;
    font-size: 0.95rem;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  #delete-confirm-box .dc-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  #delete-confirm-box .dc-cancel {
    padding: 9px 24px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: #aaa;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  #delete-confirm-box .dc-cancel:hover { background: #333; }
  #delete-confirm-box .dc-delete {
    padding: 9px 24px;
    background: #7a2020;
    border: 1px solid #bf2d2d;
    color: #ffaaaa;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
  }
  #delete-confirm-box .dc-delete:hover { background: #962626; }
</style>
</head>
<body class="fit-cover">
<div id="empty">
  <div>No photos yet</div>
  <div style="font-size:1rem;opacity:0.7">Upload via the manage page</div>
</div>
<div id="counter"></div>
<canvas id="fx-canvas"></canvas>

<!-- Settings overlay (long-press) -->
<div id="settings-overlay">
  <div id="settings-layout">
    <!-- Info panels injected here by JS -->
    <div id="settings-panel">
      <h2>Slideshow Settings</h2>
      <button class="s-close" id="s-close-btn">×</button>

      <div class="s-row">
        <label>Interval</label>
        <input type="range" id="s-interval" min="3" max="120" step="1" style="flex:1">
        <span class="s-interval-val" id="s-interval-val">10s</span>
      </div>
      <div class="s-row">
        <label>Transition</label>
        <select id="s-transition">
          <option value="random">Random</option>
          <option value="crossfade">Crossfade</option>
          <option value="slide_left">Slide left</option>
          <option value="slide_right">Slide right</option>
          <option value="slide_up">Slide up</option>
          <option value="slide_down">Slide down</option>
          <option value="zoom_in">Zoom in</option>
          <option value="zoom_out">Zoom out</option>
          <option value="fade_black">Fade through black</option>
          <option value="wipe">Wipe</option>
          <option value="curtain">Curtain</option>
          <option value="rotate_fade">Rotate &amp; fade</option>
          <option value="flip_h">Flip</option>
          <option value="iris">Circle iris</option>
          <option value="diagonal_wipe">Diagonal wipe</option>
          <option value="clock_wipe">Clock wipe</option>
          <option value="pixelate">Pixelate</option>
          <option value="glitch">Glitch</option>
          <option value="shatter">Shatter</option>
          <option value="none">None</option>
        </select>
      </div>
      <div class="s-row">
        <label>Ken Burns</label>
        <label class="s-toggle">
          <input type="checkbox" id="s-kenburns">
          <div class="s-toggle-track"></div>
        </label>
      </div>
      <div class="s-row" id="s-kbspeed-row">
        <label>KB Speed</label>
        <select id="s-kbspeed">
          <option value="normal">Normal</option>
          <option value="slow">Slow</option>
          <option value="slowest">Slowest</option>
        </select>
      </div>
      <div class="s-row">
        <label>Order</label>
        <select id="s-order">
          <option value="random">Random</option>
          <option value="sequential">Sequential</option>
        </select>
      </div>
      <div class="s-row">
        <label>Fit</label>
        <select id="s-fit">
          <option value="cover">Cover (fill)</option>
          <option value="contain">Contain (letterbox)</option>
        </select>
      </div>

      <button class="s-resume" id="s-resume-btn">▶ Resume Slideshow</button>
      <button class="s-save" id="s-save-btn">Save</button>
      <div class="s-hint">Hold screen to open settings · Changes sync to Home Assistant</div>
      <div id="settings-countdown"></div>
    </div>
  </div>
</div>

<!-- Manage modal -->
<div id="manage-modal">
  <div id="manage-panel">
    <button class="m-close" id="m-close-btn">×</button>
    <div id="manage-img-wrap">
      <!-- img or video injected by JS -->
    </div>
    <div id="manage-body">
      <div class="m-row">
        <label>Title</label>
        <input type="text" id="m-title" placeholder="Display name">
      </div>
      <div class="m-row">
        <label>Date</label>
        <span id="m-date">—</span>
      </div>
      <div class="m-row">
        <label>Size</label>
        <span id="m-size">—</span>
      </div>
      <div class="m-actions">
        <button class="m-btn-save" id="m-save-btn">Save title</button>
        <button class="m-btn-delete" id="m-delete-btn">🗑 Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirmation dialog -->
<div id="delete-confirm">
  <div id="delete-confirm-box">
    <p>Delete this photo permanently?<br><span id="dc-filename" style="color:#888;font-size:0.82rem"></span></p>
    <div class="dc-actions">
      <button class="dc-cancel" id="dc-cancel-btn">Cancel</button>
      <button class="dc-delete" id="dc-delete-btn">Delete</button>
    </div>
  </div>
</div>

<script>
  const VIDEO_EXTS = /\.(mp4|mov|webm|m4v)$/i
  const TRANSITION_LIST = ['crossfade','slide_left','slide_right','slide_up','slide_down',
    'zoom_in','zoom_out','fade_black','wipe','curtain','rotate_fade','flip_h',
    'iris','diagonal_wipe','clock_wipe',
    'pixelate','glitch','shatter']

  const infoCache = {}
  const dateCache = {}   // filename → 'YYYY-MM-DD' or null
  let photos = []
  let queuePos = 0
  let displayedIndex = 0
  let config = { interval: 10, transition: 'crossfade', kenBurns: false, kenBurnsSpeed: 'normal', order: 'random', fit: 'cover' }
  let timer = null
  let slotA, slotB, useA = true
  let isPaused = false

  // Track currently displayed group for info panels
  let currentGroup = []
  let currentIsDual = false
  let currentIsStack = false

  // Polling interval for photo list reload (loaded from server config)
  let photoReloadMinutes = 5

  // ── Helpers ───────────────────────────────────────────────────────────────

  function isVideo(fn) { return VIDEO_EXTS.test(fn) }
  function screenLandscape() { return window.innerWidth >= window.innerHeight }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]]
    }
  }

  function getInfo(filename) {
    if (infoCache[filename]) return Promise.resolve(infoCache[filename])
    return new Promise(resolve => {
      if (isVideo(filename)) {
        const v = document.createElement('video')
        v.preload = 'metadata'; v.muted = true
        const done = () => resolve(infoCache[filename] = {
          w: v.videoWidth || 1920, h: v.videoHeight || 1080,
          isVideo: true,
          duration: isFinite(v.duration) && v.duration > 0 ? v.duration : 30
        })
        v.onloadedmetadata = done; v.onerror = done
        v.src = '/photos/' + encodeURIComponent(filename)
      } else {
        const img = new Image()
        const done = () => resolve(infoCache[filename] = {
          w: img.naturalWidth || 1920, h: img.naturalHeight || 1080,
          isVideo: false
        })
        img.onload = done; img.onerror = done
        img.src = '/photos/' + encodeURIComponent(filename)
      }
    })
  }

  function needsDual(info) {
    const ar = info.w / info.h
    return screenLandscape() ? ar < 0.85 : ar > 1.20
  }

  function nextFrame() {
    return new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)))
  }

  // ── Group selection ───────────────────────────────────────────────────────

  async function getNextGroup() {
    if (!photos.length) return []
    displayedIndex = queuePos % photos.length
    const firstFn = photos[displayedIndex]
    const firstInfo = await getInfo(firstFn)
    if (needsDual(firstInfo) && photos.length >= 2) {
      const secondFn = photos[(queuePos + 1) % photos.length]
      queuePos = (queuePos + 2) % photos.length
      return [firstFn, secondFn]
    }
    queuePos = (queuePos + 1) % photos.length
    return [firstFn]
  }

  // ── Rendering ─────────────────────────────────────────────────────────────

  function buildMediaItem(fn, info) {
    const item = document.createElement('div')
    item.className = 'media-item'
    if (info.isVideo) {
      const v = document.createElement('video')
      v.muted = true; v.playsInline = true; v.loop = true
      if (info.h > info.w) v.classList.add('portrait')
      v.src = '/photos/' + encodeURIComponent(fn)
      const startVideo = () => {
        const safeWindow = Math.max(0, info.duration - 2)
        v.currentTime = safeWindow > 1 ? Math.random() * safeWindow : 0
        v.play().catch(() => {})
      }
      if (v.readyState >= 1) setTimeout(startVideo, 0)
      else v.onloadedmetadata = startVideo
      item.appendChild(v)
    } else {
      const img = document.createElement('img')
      img.src = '/photos/' + encodeURIComponent(fn)
      img.alt = fn
      item.appendChild(img)
    }
    // Date overlay
    const date = dateCache[fn]
    if (date) {
      const lbl = document.createElement('div')
      lbl.className = 'date-label'
      lbl.textContent = date
      item.appendChild(lbl)
    }
    return item
  }

  // ── Canvas capture ────────────────────────────────────────────────────────

  const fxCanvas = document.getElementById('fx-canvas')
  const fxCtx = fxCanvas.getContext('2d', { alpha: false })

  function resizeCanvas() {
    fxCanvas.width = window.innerWidth
    fxCanvas.height = window.innerHeight
  }
  resizeCanvas()
  window.addEventListener('resize', resizeCanvas)

  /**
   * Capture the full rendered slide to an offscreen canvas at screen resolution.
   * Handles dual-image slides, Ken Burns animated transforms, and videos.
   * Returns an HTMLCanvasElement with the same dimensions as fxCanvas.
   */
  function captureSlide(slide) {
    const W = fxCanvas.width, H = fxCanvas.height
    const off = document.createElement('canvas')
    off.width = W; off.height = H
    const ctx = off.getContext('2d')
    ctx.fillStyle = '#000'
    ctx.fillRect(0, 0, W, H)

    const slideRect = slide.getBoundingClientRect()
    const items = slide.querySelectorAll('.media-item')

    items.forEach(item => {
      const itemRect = item.getBoundingClientRect()
      // Position relative to the slide element (which is inset:0 = full screen)
      const dx = itemRect.left - slideRect.left
      const dy = itemRect.top  - slideRect.top
      const dw = itemRect.width
      const dh = itemRect.height
      if (dw <= 0 || dh <= 0) return

      const elem = item.querySelector('img, video')
      if (!elem) return

      ctx.save()
      ctx.beginPath()
      ctx.rect(dx, dy, dw, dh)
      ctx.clip()

      if (elem.tagName === 'VIDEO') {
        const vw = elem.videoWidth  || dw
        const vh = elem.videoHeight || dh
        // Always cover-fit the video frame (ignore object-fit:contain for canvas capture)
        const ar = vw / vh, boxAr = dw / dh
        let sx = 0, sy = 0, sw = vw, sh = vh
        if (ar > boxAr) { sw = vh * boxAr; sx = (vw - sw) / 2 }
        else             { sh = vw / boxAr; sy = (vh - sh) / 2 }
        ctx.drawImage(elem, sx, sy, sw, sh, dx, dy, dw, dh)
      } else {
        // Read the current CSS transform (Ken Burns animation in progress)
        const style = window.getComputedStyle(elem)
        const matrix = style.transform
        const nw = elem.naturalWidth  || dw
        const nh = elem.naturalHeight || dh

        if (matrix && matrix !== 'none') {
          const m = matrix.match(/matrix\(([^)]+)\)/)
          if (m) {
            const parts = m[1].split(',').map(Number)
            // matrix(scaleX, skewY, skewX, scaleY, translateX, translateY)
            const scaleX = parts[0], scaleY = parts[3]
            const transX = parts[4], transY = parts[5]
            // Transform origin is 50% 50% of the element
            const ox = dx + dw / 2, oy = dy + dh / 2
            ctx.translate(ox + transX, oy + transY)
            ctx.scale(scaleX, scaleY)
            // Draw image cover-fitted into the unscaled item box
            const ar = nw / nh, boxAr = dw / dh
            let sx = 0, sy = 0, sw = nw, sh = nh
            if (ar > boxAr) { sw = nh * boxAr; sx = (nw - sw) / 2 }
            else             { sh = nw / boxAr; sy = (nh - sh) / 2 }
            ctx.drawImage(elem, sx, sy, sw, sh, -dw / 2, -dh / 2, dw, dh)
          } else {
            coverDraw(ctx, elem, nw, nh, dx, dy, dw, dh)
          }
        } else {
          coverDraw(ctx, elem, nw, nh, dx, dy, dw, dh)
        }
      }
      ctx.restore()
    })
    return off
  }

  /**
   * Wait for all img/video elements in a slide to be ready to draw.
   * Returns a Promise that resolves once all media is loaded (or times out after 3s).
   */
  function waitForSlideMedia(slide) {
    const elems = [...slide.querySelectorAll('img, video')]
    if (!elems.length) return Promise.resolve()
    const promises = elems.map(elem => new Promise(resolve => {
      if (elem.tagName === 'IMG') {
        if (elem.complete && elem.naturalWidth > 0) return resolve()
        elem.addEventListener('load',  resolve, { once: true })
        elem.addEventListener('error', resolve, { once: true })
      } else {
        // video: readyState >= 2 means we have enough data to draw a frame
        if (elem.readyState >= 2) return resolve()
        elem.addEventListener('loadeddata',    resolve, { once: true })
        elem.addEventListener('canplay',       resolve, { once: true })
        elem.addEventListener('error',         resolve, { once: true })
      }
    }))
    // Timeout after 3s so we never hang
    const timeout = new Promise(r => setTimeout(r, 3000))
    return Promise.race([Promise.all(promises), timeout])
  }

  // Draw elem cover-fitted into destination rect (dx,dy,dw,dh)
  function coverDraw(ctx, elem, sw, sh, dx, dy, dw, dh) {
    const ar = sw / sh, boxAr = dw / dh
    let sx = 0, sy = 0, srcW = sw, srcH = sh
    if (ar > boxAr) { srcW = sh * boxAr; sx = (sw - srcW) / 2 }
    else             { srcH = sw / boxAr; sy = (sh - srcH) / 2 }
    ctx.drawImage(elem, sx, sy, srcW, srcH, dx, dy, dw, dh)
  }

  // ── Canvas-based transitions ──────────────────────────────────────────────

  // oldCanvas / newCanvas are HTMLCanvasElement at screen resolution (1:1 pixels)
  function doCanvasTransition(t, oldCanvas, newCanvas, duration = 1400) {
    const w = fxCanvas.width, h = fxCanvas.height
    fxCanvas.classList.add('active')

    return new Promise(resolve => {
      const startTime = performance.now()

      function animate() {
        const elapsed = performance.now() - startTime
        const progress = Math.min(elapsed / duration, 1)
        fxCtx.clearRect(0, 0, w, h)

        switch (t) {
          case 'pixelate': doPixelate(oldCanvas, newCanvas, progress); break
          case 'ripple':   doRipple(oldCanvas, newCanvas, progress);   break
          case 'glitch':   doGlitch(oldCanvas, newCanvas, progress);   break
          case 'mosaic':   doMosaic(oldCanvas, newCanvas, progress);   break
          case 'shatter':  doShatter(oldCanvas, newCanvas, progress);  break
        }

        if (progress < 1) {
          requestAnimationFrame(animate)
        } else {
          fxCanvas.classList.remove('active')
          resolve()
        }
      }
      animate()
    })
  }

  // Pixelate: old image pixelates out, new image pixelates in
  function doPixelate(oldC, newC, progress) {
    const w = fxCanvas.width, h = fxCanvas.height
    if (progress < 0.5) {
      const blockSize = Math.max(2, Math.round(2 + (progress / 0.5) * 58))
      for (let y = 0; y < h; y += blockSize) {
        for (let x = 0; x < w; x += blockSize) {
          const bw = Math.min(blockSize, w - x)
          const bh = Math.min(blockSize, h - y)
          // Sample one pixel from the centre of the block, stretch to fill
          const cx = Math.min(x + Math.floor(bw / 2), w - 1)
          const cy = Math.min(y + Math.floor(bh / 2), h - 1)
          fxCtx.drawImage(oldC, cx, cy, 1, 1, x, y, bw, bh)
        }
      }
    } else {
      const p2 = (progress - 0.5) / 0.5
      const blockSize = Math.max(2, Math.round(60 - p2 * 58))
      for (let y = 0; y < h; y += blockSize) {
        for (let x = 0; x < w; x += blockSize) {
          const bw = Math.min(blockSize, w - x)
          const bh = Math.min(blockSize, h - y)
          const cx = Math.min(x + Math.floor(bw / 2), w - 1)
          const cy = Math.min(y + Math.floor(bh / 2), h - 1)
          fxCtx.drawImage(newC, cx, cy, 1, 1, x, y, bw, bh)
        }
      }
    }
  }

  // Glitch: horizontal slice displacement, then hard cut to new
  let glitchSlices = null
  function doGlitch(oldC, newC, progress) {
    const w = fxCanvas.width, h = fxCanvas.height
    if (!glitchSlices) {
      glitchSlices = Array.from({ length: 12 }, () => ({
        y:      Math.floor(Math.random() * h),
        sliceH: Math.floor(8 + Math.random() * 48),
        offset: Math.round((Math.random() - 0.5) * 90)
      }))
    }
    if (progress < 0.4) {
      fxCtx.drawImage(oldC, 0, 0)
      for (const { y, sliceH, offset } of glitchSlices) {
        const sh = Math.min(sliceH, h - y); if (sh <= 0) continue
        fxCtx.drawImage(oldC, 0, y, w, sh, offset, y, w, sh)
      }
    } else if (progress < 0.6) {
      const p = (progress - 0.4) / 0.2
      fxCtx.drawImage(p < 0.5 ? oldC : newC, 0, 0)
      for (const { y, sliceH, offset } of glitchSlices) {
        const sh = Math.min(sliceH, h - y); if (sh <= 0) continue
        fxCtx.drawImage(newC, 0, y, w, sh, Math.round(offset * (1 - p)), y, w, sh)
      }
    } else {
      glitchSlices = null
      fxCtx.drawImage(newC, 0, 0)
    }
  }

  // Shatter: old image breaks into pieces that fly off, new image fades in underneath
  let shatterPieces = null
  function doShatter(oldC, newC, progress) {
    const w = fxCanvas.width, h = fxCanvas.height
    if (!shatterPieces) {
      shatterPieces = Array.from({ length: 20 }, (_, i) => ({
        px: (i % 5) * (w / 5), py: Math.floor(i / 5) * (h / 4),
        pw: w / 5, ph: h / 4,
        vx: (Math.random() - 0.5) * 300,
        vy: -180 + Math.random() * 80,
        rot: (Math.random() - 0.5) * Math.PI
      }))
    }
    if (progress < 0.25) {
      fxCtx.drawImage(oldC, 0, 0)
    } else if (progress < 0.75) {
      const p = (progress - 0.25) / 0.5
      // New image fades in as background
      fxCtx.globalAlpha = p
      fxCtx.drawImage(newC, 0, 0)
      fxCtx.globalAlpha = 1
      // Pieces fly off
      for (const { px, py, pw, ph, vx, vy, rot } of shatterPieces) {
        fxCtx.save()
        fxCtx.translate(px + pw / 2 + vx * p, py + ph / 2 + vy * p)
        fxCtx.rotate(rot * p)
        fxCtx.globalAlpha = 1 - p
        fxCtx.drawImage(oldC, px, py, pw, ph, -pw / 2, -ph / 2, pw, ph)
        fxCtx.restore()
      }
    } else {
      shatterPieces = null
      fxCtx.drawImage(newC, 0, 0)
    }
  }

  // ── CSS/DOM transitions ───────────────────────────────────────────────────

  async function doTransition(incoming, outgoing) {
    let t = config.transition
    if (t === 'random') t = TRANSITION_LIST[Math.floor(Math.random() * TRANSITION_LIST.length)]

    // Canvas-based transitions
    const canvasTransitions = ['pixelate', 'glitch', 'shatter']
    if (canvasTransitions.includes(t)) {
      // Capture outgoing BEFORE touching DOM (it's currently visible with Ken Burns etc.)
      const oldCanvas = captureSlide(outgoing)
      // Wait for incoming media to load so newCanvas isn't black
      await waitForSlideMedia(incoming)
      // Make incoming briefly visible (opacity:0 but rendered) so captureSlide works
      incoming.style.cssText = 'opacity:0;transform:none;transition:none'
      await nextFrame()
      const newCanvas = captureSlide(incoming)
      // Hide both DOM slides while canvas plays
      outgoing.style.cssText = 'opacity:0;transform:none;transition:none'
      await doCanvasTransition(t, oldCanvas, newCanvas)
      // Re-apply Ken Burns animation if needed (it was running on the img before)
      incoming.style.cssText = 'opacity:1;transform:none;transition:none'
      cleanupSlot(outgoing)
      return
    }

    // Set incoming initial state
    const noMotion = { none:1, wipe:1, curtain:1, fade_black:1, flip_h:1, blinds:1, iris:1, diagonal_wipe:1, clock_wipe:1 }
    if (!noMotion[t]) {
      const initialTransform = {
        slide_left:  'translateX(100%)',
        slide_right: 'translateX(-100%)',
        slide_up:    'translateY(100%)',
        slide_down:  'translateY(-100%)',
        zoom_in:     'scale(1.1)',
        zoom_out:    'scale(0.92)',
        rotate_fade: 'rotate(-4deg) scale(0.95)',
      }
      const tr = initialTransform[t] || 'none'
      const needsOpacity = !t.startsWith('slide_')
      incoming.style.cssText = `opacity:${needsOpacity ? 0 : 1};transform:${tr};transition:none`
    } else {
      incoming.style.cssText = 'opacity:1;transform:none;transition:none'
    }

    if (t === 'none') {
      incoming.style.cssText = 'opacity:1;transform:none;transition:none'
      outgoing.style.cssText  = 'opacity:0;transform:none;transition:none'
      cleanupSlot(outgoing)
      return
    }

    if (t === 'wipe') {
      incoming.style.clipPath = 'inset(0 100% 0 0)'
      incoming.style.opacity  = '1'
      await nextFrame()
      incoming.style.transition = 'clip-path 0.9s ease'
      incoming.style.clipPath   = 'inset(0 0% 0 0)'
      outgoing.style.cssText    = 'opacity:1;transition:none'
      setTimeout(() => { incoming.style.clipPath = ''; cleanupSlot(outgoing) }, 1000)
      return
    }

    if (t === 'curtain') {
      incoming.style.clipPath = 'inset(0 50%)'
      incoming.style.opacity  = '1'
      await nextFrame()
      incoming.style.transition = 'clip-path 0.9s ease'
      incoming.style.clipPath   = 'inset(0 0%)'
      outgoing.style.cssText    = 'opacity:1;transition:none'
      setTimeout(() => { incoming.style.clipPath = ''; cleanupSlot(outgoing) }, 1000)
      return
    }

    if (t === 'blinds') {
      // Reveal new image through 8 horizontal strips that open top-to-bottom
      // Reset any stale clip-path from a previous transition on this slot
      incoming.style.cssText  = 'opacity:1;transform:none;transition:none;clip-path:inset(0 0 100% 0)'
      outgoing.style.cssText  = 'opacity:1;transform:none;transition:none'
      const strips = 8
      const stripH = 100 / strips
      for (let i = 0; i < strips; i++) {
        setTimeout(() => {
          // Each strip reveals from the top edge down to the bottom of strip i
          const revealedBottom = 100 - (i + 1) * stripH
          incoming.style.transition = 'clip-path 0.12s ease'
          incoming.style.clipPath   = `inset(0 0 ${revealedBottom}% 0)`
        }, i * 100)
      }
      const totalMs = strips * 100 + 150
      await new Promise(r => setTimeout(r, totalMs))
      incoming.style.clipPath   = ''
      incoming.style.transition = ''
      cleanupSlot(outgoing)
      return
    }

    if (t === 'iris') {
      // Ensure incoming is on top by setting a higher z-index temporarily
      incoming.style.cssText = 'opacity:1;transform:none;transition:none;z-index:2;clip-path:circle(0% at 50% 50%)'
      outgoing.style.cssText = 'opacity:1;transform:none;transition:none;z-index:1'
      await nextFrame()
      incoming.style.transition = 'clip-path 1.0s ease'
      incoming.style.clipPath   = 'circle(75% at 50% 50%)'
      setTimeout(() => {
        incoming.style.clipPath   = ''
        incoming.style.transition = ''
        incoming.style.zIndex     = ''
        cleanupSlot(outgoing)
      }, 1100)
      return
    }

    if (t === 'diagonal_wipe') {
      // Triangle sweep from top-left corner — true diagonal wipe
      // 3-point polygon: start collapsed at top-left, expand to cover full screen
      incoming.style.cssText = 'opacity:1;transform:none;transition:none;z-index:2;clip-path:polygon(0% 0%, 0% 0%, 0% 0%)'
      outgoing.style.cssText = 'opacity:1;transform:none;transition:none;z-index:1'
      await nextFrame()
      incoming.style.transition = 'clip-path 1.0s ease'
      incoming.style.clipPath   = 'polygon(0% 0%, 200% 0%, 0% 200%)'
      setTimeout(() => {
        incoming.style.clipPath   = ''
        incoming.style.transition = ''
        incoming.style.zIndex     = ''
        cleanupSlot(outgoing)
      }, 1100)
      return
    }

    if (t === 'clock_wipe') {
      incoming.style.cssText = 'opacity:1;transform:none;transition:none;z-index:2;clip-path:polygon(50% 50%, 50% 0%, 50% 0%)'
      outgoing.style.cssText = 'opacity:1;transform:none;transition:none;z-index:1'
      const steps = 72  // 5° per step
      let step = 0
      const interval = setInterval(() => {
        step++
        const angle = (step / steps) * 360
        const rad   = (angle - 90) * Math.PI / 180
        const x = 50 + 60 * Math.cos(rad)
        const y = 50 + 60 * Math.sin(rad)
        let poly
        if      (angle <= 90)  poly = `polygon(50% 50%, 50% 0%, ${x}% ${y}%)`
        else if (angle <= 180) poly = `polygon(50% 50%, 50% 0%, 100% 0%, ${x}% ${y}%)`
        else if (angle <= 270) poly = `polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, ${x}% ${y}%)`
        else                   poly = `polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, ${x}% ${y}%)`
        incoming.style.clipPath = poly
        if (step >= steps) {
          clearInterval(interval)
          incoming.style.clipPath   = ''
          incoming.style.zIndex     = ''
          cleanupSlot(outgoing)
        }
      }, 14)
      return
    }

    if (t === 'flip_h') {
      outgoing.style.cssText = 'opacity:1;transform:perspective(800px) rotateY(0deg);transition:transform 0.4s ease'
      incoming.style.cssText = 'opacity:0;transform:perspective(800px) rotateY(90deg);transition:none'
      await nextFrame()
      outgoing.style.transform = 'perspective(800px) rotateY(-90deg)'
      await new Promise(r => setTimeout(r, 420))
      incoming.style.cssText = 'opacity:1;transform:perspective(800px) rotateY(0deg);transition:transform 0.4s ease'
      setTimeout(() => cleanupSlot(outgoing), 500)
      return
    }

    if (t === 'fade_black') {
      outgoing.style.cssText = 'opacity:0;transform:none;transition:opacity 0.55s ease'
      incoming.style.cssText = 'opacity:0;transform:none;transition:none'
      await new Promise(r => setTimeout(r, 600))
      incoming.style.cssText = 'opacity:1;transform:none;transition:opacity 0.55s ease'
      cleanupSlot(outgoing)
      return
    }

    await nextFrame()

    if (t.startsWith('slide_')) {
      const axis = (t === 'slide_up' || t === 'slide_down') ? 'Y' : 'X'
      incoming.style.cssText = `opacity:1;transform:none;transition:transform 0.9s ease`
      outgoing.style.cssText = `opacity:1;transform:translate${axis}(${t === 'slide_left' || t === 'slide_up' ? '-' : ''}100%);transition:transform 0.9s ease`
      setTimeout(() => cleanupSlot(outgoing), 1000)
    } else {
      // zoom_in, zoom_out, rotate_fade, crossfade
      incoming.style.cssText = 'opacity:1;transform:none;transition:opacity 1.1s ease,transform 1.1s ease'
      outgoing.style.cssText  = 'opacity:0;transform:none;transition:opacity 0.8s ease'
      setTimeout(() => cleanupSlot(outgoing), 1200)
    }
  }

  async function showGroup(group) {
    if (!group.length) return
    const infos = await Promise.all(group.map(getInfo))
    const isDual  = group.length > 1
    const isStack = isDual && !screenLandscape()

    // Track for info panels
    currentGroup   = group
    currentIsDual  = isDual
    currentIsStack = isStack

    const incoming = useA ? slotA : slotB
    const outgoing = useA ? slotB : slotA
    useA = !useA

    incoming.innerHTML = ''
    incoming.className = 'slide' + (isStack ? ' stacked' : '')
    group.forEach((fn, i) => incoming.appendChild(buildMediaItem(fn, infos[i])))

    if (config.kenBurns) {
      const speedMult = config.kenBurnsSpeed === 'slowest' ? 3 : config.kenBurnsSpeed === 'slow' ? 2 : 1
      const kbDuration = config.interval * speedMult
      incoming.querySelectorAll('.media-item img').forEach(img => {
        const n = 1 + Math.floor(Math.random() * 3)
        img.style.animation = `kb${n} ${kbDuration}s ease-in-out forwards`
      })
    }

    await doTransition(incoming, outgoing)

    document.getElementById('counter').textContent = (displayedIndex + 1) + ' / ' + photos.length
    if (photos.length > 0) getInfo(photos[queuePos % photos.length])
  }

  function cleanupSlot(slot) {
    slot.querySelectorAll('video').forEach(v => v.pause())
    slot.innerHTML = ''
    slot.style.cssText = 'opacity:0;transform:none;transition:none;clip-path:none;z-index:auto'
  }

  // ── Timer & public API ────────────────────────────────────────────────────

  async function advance() {
    const group = await getNextGroup()
    if (group.length) await showGroup(group)
  }

  function startTimer() {
    if (timer) clearInterval(timer)
    timer = setInterval(advance, config.interval * 1000)
  }

  window.nextSlide = function() { clearInterval(timer); advance(); startTimer() }

  window.prevSlide = function() {
    queuePos = ((queuePos - 2) + photos.length * 4) % photos.length
    clearInterval(timer); advance(); startTimer()
  }

  window.setConfig = function(updates) {
    const prevOrder = config.order
    Object.assign(config, updates)
    document.body.className = 'fit-' + config.fit
    document.documentElement.style.setProperty('--dur', config.interval + 's')
    if (updates.order && updates.order !== prevOrder) {
      if (config.order === 'random') shuffle(photos)
      else photos.sort()
      queuePos = 0
    }
    if (timer) startTimer()
  }

  window.reloadPhotos = async function() {
    try {
      const res = await fetch('/api/photos')
      const list = await res.json()
      // Cache dates from API response
      list.forEach(f => { if (f.name && f.date !== undefined) dateCache[f.name] = f.date || null })
      if (config.order === 'random') shuffle(list)
      else list.sort()
      photos = list.map(f => f.name || f)
      document.getElementById('empty').classList.toggle('visible', photos.length === 0)
    } catch(e) { console.error('reloadPhotos', e) }
  }

  // ── Long-press → settings overlay ────────────────────────────────────────

  const overlay    = document.getElementById('settings-overlay')
  const sInterval  = document.getElementById('s-interval')
  const sIntervalV = document.getElementById('s-interval-val')
  const sTrans     = document.getElementById('s-transition')
  const sKB        = document.getElementById('s-kenburns')
  const sKBSpeed   = document.getElementById('s-kbspeed')
  const sOrder     = document.getElementById('s-order')
  const sFit       = document.getElementById('s-fit')

  // ── Settings overlay: pause, auto-close, info panels ─────────────────────

  let settingsAutoCloseTimer = null
  const settingsLayout    = document.getElementById('settings-layout')
  const settingsCountdown = document.getElementById('settings-countdown')

  function resetSettingsAutoClose() {
    if (!overlay.classList.contains('open')) return
    if (settingsAutoCloseTimer) clearTimeout(settingsAutoCloseTimer)
    // Restart countdown bar animation
    settingsCountdown.style.transition = 'none'
    settingsCountdown.style.transform  = 'scaleX(1)'
    requestAnimationFrame(() => requestAnimationFrame(() => {
      settingsCountdown.style.transition = 'transform 30s linear'
      settingsCountdown.style.transform  = 'scaleX(0)'
    }))
    settingsAutoCloseTimer = setTimeout(() => {
      closeSettings()
      if (!isPaused) resumeSlideshow()
    }, 30000)
  }

  function buildInfoPanels() {
    // Remove any existing info panels
    settingsLayout.querySelectorAll('.info-panel').forEach(p => p.remove())
    if (!currentGroup.length) return

    // Determine layout direction
    // Dual side-by-side → row (default); dual stacked → col; single landscape → row; single portrait → col
    const isRow = currentIsDual ? !currentIsStack : screenLandscape()
    settingsLayout.classList.toggle('layout-col', !isRow)

    currentGroup.forEach((fn, i) => {
      const panel = document.createElement('div')
      panel.className = 'info-panel'

      const thumb = document.createElement('img')
      thumb.className = 'info-panel-thumb'
      // Videos don't have thumbs — use the photo URL directly (browser will show first frame)
      if (VIDEO_EXTS.test(fn)) {
        thumb.src = '/photos/' + encodeURIComponent(fn)
      } else {
        thumb.src = '/thumbs/' + encodeURIComponent(fn)
        thumb.onerror = () => { thumb.src = '/photos/' + encodeURIComponent(fn) }
      }
      panel.appendChild(thumb)

      const name = document.createElement('div')
      name.className = 'info-panel-name'
      name.textContent = fn
      panel.appendChild(name)

      const btn = document.createElement('button')
      btn.className = 'info-panel-manage'
      btn.textContent = 'Manage'
      btn.addEventListener('click', () => openManageModal(fn))
      panel.appendChild(btn)

      // Insert: for row layout, first item before settings-panel, second after
      // For col layout, first item before settings-panel, second after
      if (i === 0) {
        settingsLayout.insertBefore(panel, document.getElementById('settings-panel'))
      } else {
        settingsLayout.appendChild(panel)
      }
    })
  }

  function openSettings() {
    sInterval.value = config.interval
    sIntervalV.textContent = config.interval + 's'
    sTrans.value    = config.transition
    sKB.checked     = !!config.kenBurns
    sKBSpeed.value  = config.kenBurnsSpeed || 'normal'
    sOrder.value    = config.order
    sFit.value      = config.fit

    // Pause slideshow timer and any playing background videos
    if (timer) { clearInterval(timer); timer = null }
    document.querySelectorAll('.slide video').forEach(v => v.pause())

    buildInfoPanels()
    overlay.classList.add('open')
    resetSettingsAutoClose()
  }

  function closeSettings() {
    overlay.classList.remove('open')
    if (settingsAutoCloseTimer) { clearTimeout(settingsAutoCloseTimer); settingsAutoCloseTimer = null }
    settingsLayout.querySelectorAll('.info-panel').forEach(p => p.remove())
    settingsLayout.classList.remove('layout-col')
    // Resume any paused background videos
    document.querySelectorAll('.slide video').forEach(v => v.play().catch(() => {}))
  }

  // Reset auto-close timer on any interaction within the overlay
  overlay.addEventListener('pointerdown', resetSettingsAutoClose)
  overlay.addEventListener('input',       resetSettingsAutoClose)
  overlay.addEventListener('change',      resetSettingsAutoClose)

  sInterval.addEventListener('input', () => { sIntervalV.textContent = sInterval.value + 's' })

  document.getElementById('s-close-btn').addEventListener('click', () => {
    closeSettings()
    if (!isPaused) resumeSlideshow()
  })

  document.getElementById('s-save-btn').addEventListener('click', async () => {
    const newCfg = {
      interval:      parseInt(sInterval.value),
      transition:    sTrans.value,
      kenBurns:      sKB.checked,
      kenBurnsSpeed: sKBSpeed.value,
      order:         sOrder.value,
      fit:           sFit.value,
    }
    try {
      await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newCfg)
      })
      window.setConfig(newCfg)
    } catch(e) { console.error('save config', e) }
    closeSettings()
    resumeSlideshow()
  })

  document.getElementById('s-resume-btn').addEventListener('click', () => {
    closeSettings()
    resumeSlideshow()
  })

  // Long-press detection (500ms hold, cancel on >8px movement)
  let pressTimer = null
  let pressStart = { x: 0, y: 0 }

  function startPress(x, y) {
    pressStart = { x, y }
    pressTimer = setTimeout(() => { pressTimer = null; openSettings() }, 500)
  }
  function cancelPress(x, y) {
    if (!pressTimer) return
    if (x !== undefined) {
      const dx = x - pressStart.x, dy = y - pressStart.y
      if (dx * dx + dy * dy < 64) return  // <8px — not a drag
    }
    clearTimeout(pressTimer); pressTimer = null
  }

  document.addEventListener('mousedown',  e => { if (!overlay.classList.contains('open')) startPress(e.clientX, e.clientY) })
  document.addEventListener('mouseup',    e => cancelPress(e.clientX, e.clientY))
  document.addEventListener('mousemove',  e => cancelPress(e.clientX, e.clientY))
  document.addEventListener('touchstart', e => { if (!overlay.classList.contains('open')) startPress(e.touches[0].clientX, e.touches[0].clientY) }, { passive: true })
  document.addEventListener('touchend',   () => cancelPress())
  document.addEventListener('touchmove',  e => cancelPress(e.touches[0].clientX, e.touches[0].clientY), { passive: true })

  // ── Init ──────────────────────────────────────────────────────────────────

  async function init() {
    // Log server commit hash for version verification
    fetch('/api/version').then(r => r.json()).then(v => {
      console.log('%c[slideshow] server commit: ' + v.commit, 'color:#4af;font-weight:bold')
    }).catch(() => {})

    slotA = document.createElement('div')
    slotB = document.createElement('div')
    slotA.className = slotB.className = 'slide'
    slotA.style.cssText = slotB.style.cssText = 'opacity:0'
    document.body.appendChild(slotA)
    document.body.appendChild(slotB)

    // Check for preview mode
    const params = new URLSearchParams(window.location.search)
    const previewFile = params.get('preview')

    if (previewFile) {
      try {
        const cfg = await fetch('/api/config').then(r => r.json())
        Object.assign(config, cfg)
        document.body.className = 'fit-' + config.fit
        photos = [previewFile]
        await advance()
        document.addEventListener('keydown', e => { if (e.key === 'Escape') window.close() })
      } catch(e) { console.error('preview init', e) }
      return
    }

    // Normal slideshow mode
    try {
      const [photosRes, configRes, pollingRes] = await Promise.all([
        fetch('/api/photos'),
        fetch('/api/config'),
        fetch('/api/config/polling')
      ])
      const list = await photosRes.json()
      const cfg  = await configRes.json()
      const poll = await pollingRes.json()
      if (poll.photoReloadMinutes) photoReloadMinutes = poll.photoReloadMinutes
      Object.assign(config, cfg)
      document.body.className = 'fit-' + config.fit
      document.documentElement.style.setProperty('--dur', config.interval + 's')

      // Cache dates from initial photo list
      list.forEach(f => { if (f.name && f.date !== undefined) dateCache[f.name] = f.date || null })

      if (config.order === 'random') shuffle(list)
      photos = list.map(f => f.name || f)
      document.getElementById('empty').classList.toggle('visible', photos.length === 0)

      if (photos.length > 0) {
        await advance()
        startTimer()
      }
    } catch(e) { console.error('init', e) }

    setInterval(window.reloadPhotos, photoReloadMinutes * 60 * 1000)

    // Connect WebSocket for real-time remote control
    connectWebSocket()
  }

  async function showNow(filename) {
    if (timer) clearInterval(timer)
    timer = null
    isPaused = true
    const panel = document.getElementById('settings-panel')
    if (panel) panel.classList.add('paused')

    const idx = photos.indexOf(filename)
    if (idx !== -1) {
      queuePos = idx
    } else {
      await window.reloadPhotos()
      const idx2 = photos.indexOf(filename)
      if (idx2 !== -1) {
        queuePos = idx2
      } else {
        photos.push(filename)
        queuePos = photos.length - 1
      }
    }
    await advance()
  }

  function resumeSlideshow() {
    isPaused = false
    const panel = document.getElementById('settings-panel')
    if (panel) panel.classList.remove('paused')
    startTimer()
  }

  // ── Manage modal ──────────────────────────────────────────────────────────

  const manageModal   = document.getElementById('manage-modal')
  const manageImgWrap = document.getElementById('manage-img-wrap')
  const mTitle        = document.getElementById('m-title')
  const mDate         = document.getElementById('m-date')
  const mSize         = document.getElementById('m-size')
  let   manageFilename = null

  function formatBytes(bytes) {
    if (bytes < 1024)       return bytes + ' B'
    if (bytes < 1048576)    return (bytes / 1024).toFixed(1) + ' KB'
    return (bytes / 1048576).toFixed(1) + ' MB'
  }

  async function openManageModal(fn) {
    manageFilename = fn
    manageImgWrap.innerHTML = ''
    mTitle.value = ''
    mTitle.placeholder = fn   // use filename as placeholder instead of generic text
    mDate.textContent = '—'
    mSize.textContent = '—'

    // Show media preview
    if (VIDEO_EXTS.test(fn)) {
      const v = document.createElement('video')
      v.src = '/photos/' + encodeURIComponent(fn)
      v.muted = true; v.playsInline = true; v.controls = true
      manageImgWrap.appendChild(v)
    } else {
      const img = document.createElement('img')
      img.src = '/photos/' + encodeURIComponent(fn)
      img.alt = fn
      manageImgWrap.appendChild(img)
    }

    manageModal.classList.add('open')

    // Fetch info
    try {
      const info = await fetch('/api/photos/' + encodeURIComponent(fn) + '/info').then(r => r.json())
      mTitle.value      = info.displayName || ''
      mDate.textContent = info.date || '—'
      mSize.textContent = info.size ? formatBytes(info.size) : '—'
    } catch(e) { console.error('manage info', e) }
  }

  function closeManageModal() {
    manageModal.classList.remove('open')
    manageImgWrap.innerHTML = ''
    manageFilename = null
  }

  document.getElementById('m-close-btn').addEventListener('click', closeManageModal)

  document.getElementById('m-save-btn').addEventListener('click', async () => {
    if (!manageFilename) return
    try {
      await fetch('/api/meta/' + encodeURIComponent(manageFilename), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ displayName: mTitle.value.trim() })
      })
    } catch(e) { console.error('save title', e) }
    closeManageModal()
  })

  document.getElementById('m-delete-btn').addEventListener('click', () => {
    if (!manageFilename) return
    document.getElementById('dc-filename').textContent = manageFilename
    document.getElementById('delete-confirm').classList.add('open')
  })

  document.getElementById('dc-cancel-btn').addEventListener('click', () => {
    document.getElementById('delete-confirm').classList.remove('open')
  })

  document.getElementById('dc-delete-btn').addEventListener('click', async () => {
    if (!manageFilename) return
    document.getElementById('delete-confirm').classList.remove('open')
    try {
      await fetch('/api/photos/' + encodeURIComponent(manageFilename), { method: 'DELETE' })
    } catch(e) { console.error('delete', e) }
    // Reload page to refresh slideshow
    location.reload()
  })

  // ── WebSocket connection ──────────────────────────────────────────────────

  function connectWebSocket() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws'
    const ws = new WebSocket(`${proto}://${location.host}`)

    ws.addEventListener('message', async (event) => {
      let msg
      try { msg = JSON.parse(event.data) } catch { return }

      if (msg.type === 'show-now' && msg.filename) {
        await showNow(msg.filename)
      } else if (msg.type === 'resume-slideshow') {
        resumeSlideshow()
      } else if (msg.type === 'config' && msg.config) {
        window.setConfig(msg.config)
      } else if (msg.type === 'photo-deleted') {
        photos = photos.filter(p => p !== msg.filename)
        document.getElementById('empty').classList.toggle('visible', photos.length === 0)
      }
    })

    ws.addEventListener('close', () => { setTimeout(connectWebSocket, 3000) })
    ws.addEventListener('error', () => { ws.close() })
  }

  init()
</script>
</body>
</html>
