<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lights</title>
    <style>
        body { margin: 0; background: #0b0b0b; display: flex; justify-content: center; align-items: flex-start; height: 100vh; font-family: system-ui, -apple-system, sans-serif; color: #fff; user-select: none; overflow: hidden; }
        #dashboard-container { position: relative; width: 850px; height: 1095px; background: #121212; box-shadow: 0 25px 60px rgba(0,0,0,0.8); border: 1px solid #222; border-radius: 16px; overflow: hidden; transform-origin: top center; }
        .floor-overlay { position: absolute; top: 25px; right: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 100; background: rgba(20,20,20,0.75); padding: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
        .floor-btn { padding: 12px 24px; background: #2c2c2e; color: #e5e5ea; border: none; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; text-align: center; width: 150px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
        .floor-btn.active { background: #00ff00; color: #000; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        .astro-readout { position: absolute; bottom: 25px; left: 25px; font-family: monospace; font-size: 11px; color: #666; background: rgba(10,10,10,0.6); padding: 6px 12px; border-radius: 6px; pointer-events: none; z-index: 100; border: 1px solid #222; }

        /* ── Light popup ── */
        #lp-backdrop { display: none; position: absolute; inset: 0; z-index: 200; pointer-events: none; }
        #lp-backdrop.open { display: block; }
        #lp-popup { display: none; }
        #lp-popup.open {
            display: block; position: absolute; z-index: 201; min-width: 220px; max-width: 280px;
            background: #1c1c1e; border: 1px solid #333; border-radius: 16px;
            padding: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
        }
        .lp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .lp-name { font-size: 0.95rem; font-weight: 600; color: #ddd; flex: 1; }
        .lp-close { background: none; border: none; color: #555; font-size: 1.2rem; cursor: pointer; padding: 0 2px; line-height: 1; }
        .lp-toggle {
            width: 44px; height: 26px; border-radius: 13px; border: none;
            background: #333; position: relative; cursor: pointer; flex-shrink: 0;
            transition: background 0.2s;
        }
        .lp-toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 20px; height: 20px; border-radius: 50%; background: #666;
            transition: transform 0.2s, background 0.2s;
        }
        .lp-toggle.lp-on { background: #c8922a; }
        .lp-toggle.lp-on::after { transform: translateX(18px); background: #fff; }
        .lp-sliders { display: flex; flex-direction: column; gap: 10px; }
        .lp-slider-row { display: flex; align-items: center; gap: 8px; }
        .lp-slider-label { font-size: 0.62rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; width: 68px; flex-shrink: 0; }
        .lp-slider {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 4px; border-radius: 2px; outline: none; cursor: pointer; background: #333;
        }
        .lp-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #c8922a; cursor: pointer; border: none; }
        .lp-slider::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: #c8922a; cursor: pointer; border: none; }
        .lp-slider-val { font-size: 0.7rem; color: #666; width: 32px; text-align: right; flex-shrink: 0; }
    </style>
</head>
<body>

    <script type="importmap">

    </script>

          { name: "Kitchen - table light",            haRoom: "kitchen",     haLight: "table",      type: "spot",  maxIntensity: 1.00, floor: "bottom", coords: { x: 465.0, y: 253.0, z: 40.2  }, spotParams: { angle: 85, pitch: -90, yaw: -180 } },

          { name: "Bathroom - spot5 (BL)",            haRoom: "bathroom",    haLight: "",           type: "spot",  maxIntensity: 1.00, floor: "bottom", coords: { x: 18.0,  y: 253.0, z: -137.8 }, spotParams: { angle: 40, pitch: -90, yaw: -180 } },
          { name: "Bathroom - spot6 (BR)",            haRoom: "bathroom",    haLight: "",           type: "spot",  maxIntensity: 1.00, floor: "bottom", coords: { x: 106.0, y: 253.0, z: -137.8 }, spotParams: { angle: 40, pitch: -90, yaw: -180 } },
          { name: "Laundry room - ceiling",           haRoom: "laundry room", haLight: "",          type: "point", maxIntensity: 0.80, floor: "bottom", coords: { x: -217.0, y: 253.0, z: -170.8 }, params: {} },
          { name: "Exercise room - ceiling",          haRoom: "exercise room", haLight: "",         type: "point", maxIntensity: 0.80, floor: "bottom", coords: { x: -217.0, y: 241.0, z: -592.8 }, params: {} },
          { name: "Play room - ceiling",              haRoom: "play room",   haLight: "",           type: "point", maxIntensity: 0.80, floor: "bottom", coords: { x: -217.0, y: 262.0, z: -1061.8 }, params: {} },
          { name: "Stairway - upper wall",            haRoom: "stairway",    haLight: "upper",      type: "point", maxIntensity: 1.50, floor: "top",    coords: { x: -0.9,  y: 401.8, z: 245.0 }, params: {} },
          { name: "Upstairs lobby - LED left",        haRoom: "upstairs lobby", haLight: "",        type: "led",   maxIntensity: 0.80, floor: "top",    coords: { x: 230.7, y: 453.2, z: 277.4 }, ledParams: { length: 443, spacing: 20, yawRad: -90, pitchRad: -90 } },
          { name: "Upstairs lobby - LED right",       haRoom: "upstairs lobby", haLight: "",        type: "led",   maxIntensity: 0.80, floor: "top",    coords: { x: 230.7, y: 453.2, z: 413.4 }, ledParams: { length: 443, spacing: 20, yawRad: -90, pitchRad: -90 } },
          { name: "Upstairs game room - LED left",    haRoom: "game room",   haLight: "",           type: "led",   maxIntensity: 0.80, floor: "top",    coords: { x: 702.7, y: 453.2, z: 277.4 }, ledParams: { length: 443, spacing: 20, yawRad: -90, pitchRad: -90 } },
          { name: "Upstairs game room - LED right",   haRoom: "game room",   haLight: "",           type: "led",   maxIntensity: 0.80, floor: "top",    coords: { x: 702.7, y: 453.2, z: 413.4 }, ledParams: { length: 443, spacing: 20, yawRad: -90, pitchRad: -90 } },
        ];

        // ── HA state store ───────────────────────────────────────────────────────
        // entity_id → { state, attributes }
        let haStates = {};
        // entity_id → array of cfg entries that use it
        let entityToCfgs = {};
        // cfg.name → THREE light object(s)
        let cfgToLights = {};
        // rainbow light THREE.PointLight reference for animation
        let rainbowLight3d = null;
        let rainbowHue = 0;
        // entity_id → timestamp of last optimistic toggle (suppress poll overwrite for 5s)
        const optimisticLock = {};
        const OPTIMISTIC_LOCK_MS = 5000;

        // ── Scene globals ────────────────────────────────────────────────────────
        let houseCutPlane, globalHouse, ambientLight, sunLight;
        let activeFloorMode = 'bottom';
        let targetPlaneHeight = 280;
        let currentBottomFloorOpacity = 0.0;
        let targetBottomFloorOpacity = 0.0;
        const isMobile = window.matchMedia('(pointer: coarse)').matches;
        const animationSpeed = 0.07;
        let bottomFloorMeshesToFade = [];
        let compiledActiveSceneLights = [];
        let clickableBeadObjects = [];
        let dashedCircleTexture = null;

        const topFloorHidden = ["top_1767","left_1768","right_1769","front_1771","top_1773","left_1774","right_1775","front_1777","top_1779","left_1780","right_1781","front_1783","top_1785","left_1786","right_1787","front_1789"];
        const secondFloorPlates = ["room_95_431","room_96_432","room_97_433","room_98_434"];
        const secondFloorWalls = ["wall_50_298","wall_51_305","wall_64_383","wall_62_371","wall_54_322","wall_56_334","wall_53_316","wall_52_311","wall_50_299","wall_51_304","wall_60_359","wall_48_287","wall_49_293","wall_59_353","wall_55_329","wall_54_323","wall_56_335","wall_57_341","wall_58_346","wall_61_364","wall_65_388","wall_63_376","wall_64_382","wall_62_370","wall_66_395","wall_67_400","wall_66_394","wall_67_401","wall_57_340","wall_55_328","wall_59_352","wall_60_358","wall_65_389","wall_63_377","wall_61_365","wall_58_347"];
        const fadingElements = ["top_1791","left_1792","right_1793","back_1794","front_1795","top_1797","left_1798","right_1799","back_1800","front_1801","top_1803","left_1804","right_1805","front_1807","top_1809","left_1810","right_1811","back_1812","front_1813","top_1815","left_1816","right_1817","back_1818","front_1819","top_1821","left_1822","right_1823","back_1824","front_1825"];
        const baseLayers = ["room_68_404","756","PolyMesh_4_841"];
        const overlayLayers = ["Oriental_rug_1001","752","1015","838","PolyMesh_6_839"];

        const container = document.getElementById('dashboard-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0c0c0d);

        const camera = new THREE.PerspectiveCamera(50, 850 / 1095, 0.1, 10000);
        camera.position.set(290.4, 2076.3, 1439.5);
        camera.rotation.set(-0.9793, -0.0100, 0.0000, 'YXZ');

        let renderer;
        try {
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        } catch(e) {
            container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-family:system-ui;font-size:1rem;text-align:center;padding:40px">3D view unavailable<br><span style="font-size:0.75rem;color:#333;margin-top:8px;display:block">WebGL not supported on this device</span></div>';

        scene.add(ambientLight);

        scene.add(sunLight);

        houseCutPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 280);

        function createRainbowBeadTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);
            // Rainbow ring
            const grad = ctx.createConicGradient(0, 64, 64);
            grad.addColorStop(0,     'hsl(0,100%,55%)');
            grad.addColorStop(1/6,   'hsl(60,100%,55%)');
            grad.addColorStop(2/6,   'hsl(120,100%,55%)');
            grad.addColorStop(3/6,   'hsl(180,100%,55%)');
            grad.addColorStop(4/6,   'hsl(240,100%,55%)');
            grad.addColorStop(5/6,   'hsl(300,100%,55%)');
            grad.addColorStop(1,     'hsl(360,100%,55%)');
            ctx.strokeStyle = grad; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.arc(64, 64, 54, 0, Math.PI * 2); ctx.stroke();
            // Dark outline
            ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(64, 64, 54, 0, Math.PI * 2); ctx.stroke();
            return new THREE.CanvasTexture(canvas);
        }

        function createDashedCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);
            ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.arc(64, 64, 54, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([16, 12]); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(64, 64, 54, 0, Math.PI * 2); ctx.stroke();
            return new THREE.CanvasTexture(canvas);
        }
        dashedCircleTexture = createDashedCircleTexture();

        // ── Color helpers ────────────────────────────────────────────────────────

        // Convert mireds color_temp to a warm/cool RGB THREE.Color
        function miredsToColor(mireds) {
            // mireds range typically 153 (6500K cool) – 500 (2000K warm)
            const kelvin = 1000000 / Math.max(mireds, 1);
            return kelvinToThreeColor(kelvin);
        }

        function kelvinToThreeColor(K) {
            // Tanner Helland algorithm
            K = Math.max(1000, Math.min(40000, K)) / 100;
            let r, g, b;
            if (K <= 66) {
                r = 255;
                g = K <= 0 ? 0 : Math.min(255, 99.4708025861 * Math.log(K) - 161.1195681661);
                b = K >= 19 ? Math.min(255, 138.5177312231 * Math.log(K - 10) - 305.0447927307) : 0;
            } else {
                r = Math.min(255, 329.698727446 * Math.pow(K - 60, -0.1332047592));
                g = Math.min(255, 288.1221695283 * Math.pow(K - 60, -0.0755148492));
                b = 255;
            }
            return new THREE.Color(Math.max(0,r)/255, Math.max(0,g)/255, Math.max(0,b)/255);
        }

        function haStateToColor(attrs) {
            if (attrs.rgb_color) {
                const [r,g,b] = attrs.rgb_color;
                return new THREE.Color(r/255, g/255, b/255);
            }
            if (attrs.hs_color) {
                const c = new THREE.Color();
                c.setHSL(attrs.hs_color[0]/360, attrs.hs_color[1]/100, 0.5);
                return c;
            }
            if (attrs.color_temp) return miredsToColor(attrs.color_temp);
            return new THREE.Color(0xffe0a3); // warm white default
        }

        // ── HA state → 3D light update ───────────────────────────────────────────

        function applyHAStateToCfg(cfg) {
            const lights3d = cfgToLights[cfg.name];
            if (!lights3d || lights3d.length === 0) return;

            const entityId = cfg._entityId;
            const st = entityId ? haStates[entityId] : null;
            const isOn = st ? (st.state === 'on') : cfg._defaultOn;
            const attrs = (st && st.attributes) || {};

            // brightness: 0–255 → 0–1 fraction, default 1.0 if on
            const brightFrac = attrs.brightness != null ? attrs.brightness / 255 : (isOn ? 1.0 : 0.0);
            const color = isOn ? haStateToColor(attrs) : new THREE.Color(0xffe0a3);

            for (const lObj of lights3d) {
                lObj.visible = isOn;
                if (!isOn) continue;
                if (!cfg.rainbow) lObj.color.copy(color); // rainbow color is driven by animation loop
                if (cfg.type === 'point') {
                    lObj.intensity = cfg.maxIntensity * brightFrac * GLOBAL_BRIGHTNESS_MULTIPLIER;
                } else if (cfg.type === 'spot') {
                    lObj.intensity = (cfg.maxIntensity * 1.5) * brightFrac * GLOBAL_BRIGHTNESS_MULTIPLIER;
                } else if (cfg.type === 'led') {
                    lObj.intensity = cfg.maxIntensity * brightFrac * GLOBAL_BRIGHTNESS_MULTIPLIER * 2.0;
                }
            }
        }

        function applyAllHAStates() {
            for (const cfg of HOME_LIGHTS_CONFIG_LIBRARY) applyHAStateToCfg(cfg);
        }

        // ── HA fetch ─────────────────────────────────────────────────────────────

        async function fetchHAStates() {
            const entities = Object.keys(entityToCfgs);
            if (entities.length === 0) return;
            try {
                const r = await fetch('/api/ha-states-batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entities })
                });
                if (!r.ok) return;
                const map = await r.json();
                const now = Date.now();
                for (const [id, st] of Object.entries(map)) {
                    if (st && !(optimisticLock[id] && now - optimisticLock[id] < OPTIMISTIC_LOCK_MS)) {
                        haStates[id] = st;
                    }
                }
                applyAllHAStates();
                if (popupEntityId) lpRenderPopup();
            } catch(e) { /* silent */ }
        }

        // ── Build entity→cfg mapping from lights.json ────────────────────────────

        async function buildEntityMapping() {
            let lightsConfig = { rooms: [] };
            try {
                const r = await fetch('/api/lights/config');
                lightsConfig = await r.json();
            } catch(e) { /* no lights.json, fall back to defaults */ }

            // Build a flat list: { roomName, lightName, entity_id }
            const flatLights = [];
            for (const room of (lightsConfig.rooms || [])) {
                for (const light of (room.lights || [])) {
                    flatLights.push({
                        roomName: room.name.toLowerCase(),
                        lightName: light.name.toLowerCase(),
                        entity_id: light.entity_id
                    });
                }
            }

            entityToCfgs = {};

            for (const cfg of HOME_LIGHTS_CONFIG_LIBRARY) {
                // Hardcoded entity bypass (e.g. switch plugs not in lights.json)
                if (cfg.hardcodedEntityId) {
                    cfg._entityId = cfg.hardcodedEntityId;
                    cfg._defaultOn = false;
                    if (!entityToCfgs[cfg.hardcodedEntityId]) entityToCfgs[cfg.hardcodedEntityId] = [];
                    entityToCfgs[cfg.hardcodedEntityId].push(cfg);
                    continue;
                }

                const rKey = cfg.haRoom.toLowerCase();
                const lKey = cfg.haLight.toLowerCase();

                // Find best matching entity: room must match, then light name if specified
                let matched = null;
                const roomMatches = flatLights.filter(fl => fl.roomName === rKey);

                if (roomMatches.length === 0) {
                    cfg._entityId = null;
                    cfg._defaultOn = false;
                    continue;
                }

                if (lKey === '') {
                    // No light sub-key: use first entity in room (or only one)
                    matched = roomMatches[0];
                } else {
                    // Try substring match on light name
                    matched = roomMatches.find(fl => fl.lightName.includes(lKey) || lKey.includes(fl.lightName));
                    if (!matched) matched = roomMatches[0]; // fallback to first in room
                }

                cfg._entityId = matched.entity_id;
                cfg._defaultOn = false;

                if (!entityToCfgs[matched.entity_id]) entityToCfgs[matched.entity_id] = [];
                entityToCfgs[matched.entity_id].push(cfg);
            }
        }

        // ── GLTF + scene setup ───────────────────────────────────────────────────

        const gltfLoader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        gltfLoader.setDRACOLoader(dracoLoader);

        gltfLoader.load('house_dashboard.glb', async (gltf) => {
            globalHouse = gltf.scene;
            globalHouse.traverse((node) => {
                if (baseLayers.includes(node.name)) node.renderOrder = 1;
                if (overlayLayers.includes(node.name)) node.renderOrder = 2;

                let parentCheck = node, isStructuralTarget = false, isFadingTarget = false;
                while (parentCheck && parentCheck !== globalHouse) {
                    if (secondFloorPlates.includes(parentCheck.name) || secondFloorWalls.includes(parentCheck.name)) { isStructuralTarget = true; break; }
                    if (fadingElements.includes(parentCheck.name)) { isFadingTarget = true; break; }
                    parentCheck = parentCheck.parent;
                }

                if (node.isMesh && node.material) {
                    const oldMat = Array.isArray(node.material) ? node.material[0] : node.material;
                    node.material = new THREE.MeshPhongMaterial({
                        color: oldMat.color,
                        map: oldMat.map,
                        clippingPlanes: [houseCutPlane],
                        shininess: 10,
                        specular: new THREE.Color(0x222222)
                    });

                    if (isStructuralTarget) {
                        node.material.transparent = false; node.material.opacity = 1.0;
                        node.material.depthWrite = true; node.visible = false;
                    }
                    if (isFadingTarget) {
                        node.material.transparent = true; node.material.depthWrite = true; node.material.opacity = 0.0;
                        bottomFloorMeshesToFade.push(node); node.visible = false;
                    }

                    let p = node, isOverlay = false;
                    while (p && p !== globalHouse) { if (overlayLayers.includes(p.name)) { isOverlay = true; break; } p = p.parent; }
                    if (isOverlay) {
                        node.material.polygonOffset = true;
                        node.material.polygonOffsetFactor = -1;
                        node.material.polygonOffsetUnits = -4;
                    }
                }
            });

            scene.add(globalHouse);
            applyFloorVisibilityPipeline();

            // Build entity mapping, then instantiate lights, then fetch HA states
            await buildEntityMapping();
            instantiateDashboardLights();
            await fetchHAStates();

            updateAstroEnvironmentDimmer();
            setInterval(fetchHAStates, HA_POLL_MS);
        });

        // ── Astro dimmer ─────────────────────────────────────────────────────────

        function getSolarElevationAngle(lat, lon) {
            const now = new Date();
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            const declination = 23.45 * Math.sin((360 / 365) * (dayOfYear - 80) * Math.PI / 180);
            const timeInHours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
            const solarNoon = 12 - (lon / 15) - (now.getTimezoneOffset() / 60);
            const hourAngle = (timeInHours - solarNoon) * 15;
            const latRad = lat * Math.PI / 180, declRad = declination * Math.PI / 180, haRad = hourAngle * Math.PI / 180;
            return Math.asin(Math.sin(latRad) * Math.sin(declRad) + Math.cos(latRad) * Math.cos(declRad) * Math.cos(haRad)) * 180 / Math.PI;
        }

        function updateAstroEnvironmentDimmer() {
            const sunElevation = getSolarElevationAngle(55.84711188969688, 12.973289098447708);
            const dimmingFactor = Math.max(0, Math.min(1, (sunElevation + 4) / 16));
            ambientLight.intensity = (0.2 + dimmingFactor * 0.7) * GLOBAL_BRIGHTNESS_MULTIPLIER;
            sunLight.intensity = (dimmingFactor * 0.6) * GLOBAL_BRIGHTNESS_MULTIPLIER;
            const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('astro-status').innerText =
                `Astro-Dimmer [${t}] | Sun Angle: ${sunElevation.toFixed(1)}° | Environment Glow: ${Math.round(dimmingFactor * 100)}%`;
        }
        setInterval(updateAstroEnvironmentDimmer, 120000);

        // ── Floor visibility ─────────────────────────────────────────────────────

        function applyFloorVisibilityPipeline() {
            if (!globalHouse) return;
            globalHouse.traverse((node) => {
                if (topFloorHidden.includes(node.name)) node.visible = (activeFloorMode === 'bottom');
                if (secondFloorPlates.includes(node.name) || secondFloorWalls.includes(node.name)) node.visible = (activeFloorMode === 'top');
            });
            compiledActiveSceneLights.forEach(group => {
                group.visible = (group.userData.floor === activeFloorMode);
            });
        }

        // ── Instantiate 3D lights ────────────────────────────────────────────────

        function instantiateDashboardLights() {
            cfgToLights = {};
            let bathroomGroupMaster = null;

            HOME_LIGHTS_CONFIG_LIBRARY.forEach((cfg) => {
                const isBathroomFixture = cfg.name.startsWith("Bathroom - spot");
                let targetGroup = null;

                if (isBathroomFixture) {
                    if (!bathroomGroupMaster) {

                        bathroomGroupMaster.userData = { isBathroomMaster: true, childConfigs: [], floor: "bottom" };
                        const cx = 62.0, cy = 253.0, cz = -192.8;
                        const hitBoxMesh = new THREE.Mesh(new THREE.SphereGeometry(30, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
                        hitBoxMesh.position.set(cx, cy, cz); hitBoxMesh.userData = { parentGroup: bathroomGroupMaster };
                        bathroomGroupMaster.add(hitBoxMesh); clickableBeadObjects.push(hitBoxMesh);
                        const pointGeo = new THREE.BufferGeometry();

                        const pointMat = new THREE.PointsMaterial({ color: 0xffffff, size: 44, sizeAttenuation: false, map: dashedCircleTexture, transparent: true, depthTest: false, depthWrite: false });
                        const clusterPts = new THREE.Points(pointGeo, pointMat); clusterPts.renderOrder = 999;

                } else {

                    targetGroup.userData = { configRef: cfg, floor: cfg.floor };
                    const pointGeo = new THREE.BufferGeometry();
                    pointGeo.setAttribute('position', new THREE.Float32BufferAttribute([cfg.coords.x, cfg.coords.y, cfg.coords.z], 3));
                    // Always add hitbox for interaction — radius 30 to cover full visual bead
                    const hitBoxMesh = new THREE.Mesh(new THREE.SphereGeometry(30, 8, 8), new THREE.MeshBasicMaterial({ visible: false }));
                    hitBoxMesh.position.set(cfg.coords.x, cfg.coords.y, cfg.coords.z); hitBoxMesh.userData = { parentGroup: targetGroup };
                    targetGroup.add(hitBoxMesh); clickableBeadObjects.push(hitBoxMesh);

                    const billboard = new THREE.Points(pointGeo, pointMat); billboard.renderOrder = 999;
                    targetGroup.add(billboard);

                    scene.add(targetGroup); compiledActiveSceneLights.push(targetGroup);
                }

                // Create the actual THREE light and register it
                let light3d = null;
                if (cfg.type === 'point') {
                    light3d = new THREE.PointLight(0xffe0a3, cfg.maxIntensity * GLOBAL_BRIGHTNESS_MULTIPLIER * 3.0, 1200, 1.0);
                    light3d.position.set(cfg.coords.x, cfg.coords.y, cfg.coords.z);
                    light3d.visible = false;
                    targetGroup.add(light3d);

                } else if (cfg.type === 'spot') {
                    const sParams = cfg.spotParams || { angle: 45, pitch: -90, yaw: 0 };
                    light3d = new THREE.SpotLight(0xfff5d6, (cfg.maxIntensity * 1.5) * GLOBAL_BRIGHTNESS_MULTIPLIER, 3000, sParams.angle * (Math.PI / 180), 0.5, 0);
                    light3d.position.set(cfg.coords.x, cfg.coords.y, cfg.coords.z);
                    light3d.visible = false;
                    const pitchRad = sParams.pitch * (Math.PI / 180), yawRad = sParams.yaw * (Math.PI / 180), ld = 150;
                    const tNode = new THREE.Object3D();
                    tNode.position.set(cfg.coords.x + ld * Math.sin(yawRad) * Math.cos(pitchRad), cfg.coords.y + ld * Math.sin(pitchRad), cfg.coords.z + ld * Math.cos(yawRad) * Math.cos(pitchRad));

                    const lParams = cfg.ledParams || { length: 150, spacing: 15 };
                    light3d = new THREE.PointLight(0xffe0a3, cfg.maxIntensity * GLOBAL_BRIGHTNESS_MULTIPLIER * 2.0, lParams.length * 2.0, 0.5);
                    light3d.position.set(cfg.coords.x, cfg.coords.y - 10, cfg.coords.z);
                    light3d.visible = false;
                    targetGroup.add(light3d);
                }

                if (light3d) {
                    if (!cfgToLights[cfg.name]) cfgToLights[cfg.name] = [];

                }

            applyFloorVisibilityPipeline();
        }

        // ── Popup system ─────────────────────────────────────────────────────────

        let popupEntityId = null;
        let popupLabel = null;
        let popupIsSwitch = false;

        function lpIsOn(id)    { return haStates[id]?.state === 'on'; }
        function lpBrightPct(id) { const b = haStates[id]?.attributes?.brightness; return b != null ? Math.round(b/255*100) : null; }
        function lpColorTemp(id) { return haStates[id]?.attributes?.color_temp ?? null; }
        function lpColorTempRange(id) {
            const a = haStates[id]?.attributes || {};
            return { min: a.min_mireds ?? 153, max: a.max_mireds ?? 500 };
        }
        function lpSupportsColorTemp(id) {
            const modes = haStates[id]?.attributes?.supported_color_modes || [];
            return modes.includes('color_temp');

        function lpSupportsColor(id) {
            const modes = haStates[id]?.attributes?.supported_color_modes || [];
            return modes.includes('hs') || modes.includes('rgb') || modes.includes('xy') || modes.includes('rgbw') || modes.includes('rgbww');

        function lpRenderPopup() {

            const bPct = lpBrightPct(id);
            const ct = lpColorTemp(id);
            const ctr = lpColorTempRange(id);
            const hasCT = !sw && lpSupportsColorTemp(id);
            const hasColor = !sw && lpSupportsColor(id);
            const eid2 = id.replace(/[.\-]/g, '_');

            let sliders = '';
            if (!sw && on) {
                if (bPct !== null) {
                    sliders += `<div class="lp-slider-row">
                        <div class="lp-slider-label">Brightness</div>
                        <input type="range" class="lp-slider" min="1" max="100" value="${bPct}"
                            oninput="this.nextElementSibling.textContent=this.value+'%'"
                            onchange="lpSetBrightness('${id}',+this.value)">

                    sliders += `<div class="lp-slider-row">
                        <div class="lp-slider-label">Hue</div>
                        <input type="range" class="lp-slider" id="lph_${eid2}" min="0" max="360" value="${curH}"
                            style="background:linear-gradient(to right,hsl(0,100%,50%),hsl(60,100%,50%),hsl(120,100%,50%),hsl(180,100%,50%),hsl(240,100%,50%),hsl(300,100%,50%),hsl(360,100%,50%))"
                            oninput="this.nextElementSibling.textContent=this.value+'°'"
                            onchange="lpSetColor('${id}',+this.value,+(document.getElementById('lps_${eid2}')||{value:${curS}}).value)">
                        <div class="lp-slider-val">${curH}°</div></div>`;
                    sliders += `<div class="lp-slider-row">
                        <div class="lp-slider-label">Saturation</div>
                        <input type="range" class="lp-slider" id="lps_${eid2}" min="0" max="100" value="${curS}"
                            oninput="this.nextElementSibling.textContent=this.value+'%'"

        function lpOpen(entityId, label, isSwitch, px, py) {
            popupEntityId = entityId;
            // Strip "Room name - " prefix, then title-case
            const stripped = label.includes(' - ') ? label.split(' - ').slice(1).join(' - ') : label;
            popupLabel = stripped.replace(/\b\w/g, c => c.toUpperCase());

            let x = Math.min(px + 10, cw - pw - 10);

        function lpSetBrightness(id, pct) {

            if (!haStates[id]) haStates[id] = { state: 'on', attributes: {} };
            haStates[id].state = 'on';

            fetch('/api/ha-service', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: 'light', service: 'turn_on', data: { entity_id: id, brightness } }) });
        }

        function lpSetColorTemp(id, mireds) {

            fetch('/api/ha-service', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: 'light', service: 'turn_on', data: { entity_id: id, color_temp: mireds } }) });
        }

        function lpSetColor(id, hue, sat) {
            if (!haStates[id]) haStates[id] = { state: 'on', attributes: {} };
            haStates[id].attributes = haStates[id].attributes || {};
            haStates[id].attributes.hs_color = [hue, sat];
            optimisticLock[id] = Date.now();
            applyAllHAStates();
            fetch('/api/ha-service', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: 'light', service: 'turn_on', data: { entity_id: id, hs_color: [hue, sat] } }) });
        }

        // Outside-click: listen on container, close if tap is outside popup
        document.getElementById('dashboard-container').addEventListener('pointerdown', (e) => {
            if (!popupEntityId) return;

            const rect = popup.getBoundingClientRect();
            if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) lpClose();

        // Expose popup functions to global scope (needed for inline onclick/onchange in injected HTML)

        // ── Tap / hold handler ────────────────────────────────────────────────────

        let holdTimer = null;
        let pointerDownTime = 0;
        let pointerDownPos = { x: 0, y: 0 };
        let pointerDownGroup = null; // store hit group at pointerdown to reuse in pointerup
        let didHold = false;
        const HOLD_MS = 350;

        // Screen-space hit test: project each bead world pos to screen, check pixel distance
        const _beadWorldPos = new THREE.Vector3();

        const BEAD_HIT_RADIUS_PX = 26; // half of 44px + small margin

        function resolveHitGroup(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const scaleX = rect.width / 850;
            const scaleY = rect.height / 1095;
            const cx = event.clientX - rect.left;
            const cy = event.clientY - rect.top;

                const sx = (_beadNDC.x * 0.5 + 0.5) * 850 * scaleX;
                const sy = (-_beadNDC.y * 0.5 + 0.5) * 1095 * scaleY;

                if (dist < BEAD_HIT_RADIUS_PX * scaleX && dist < bestDist) {

                    bestGroup = mesh.userData.parentGroup;
                }
            }
            return bestGroup;
        }

        function groupToEntityInfo(parentGroup) {
            if (parentGroup.userData.isBathroomMaster) {
                const cfgs = parentGroup.userData.childConfigs;
                const entityId = cfgs[0]?._entityId;
                return entityId ? { entityId, label: 'Bathroom', isSwitch: false } : null;
            }
            const cfg = parentGroup.userData.configRef;
            if (!cfg || !cfg._entityId) return null;
            return { entityId: cfg._entityId, label: cfg.name, isSwitch: cfg._entityId.startsWith('switch.') };
        }

        function clientToContainer(clientX, clientY) {
            const cont = document.getElementById('dashboard-container');
            const rect = cont.getBoundingClientRect();
            return { x: (clientX - rect.left) * (850 / rect.width), y: (clientY - rect.top) * (1095 / rect.height) };
        }

        renderer.domElement.addEventListener('pointerdown', (event) => {
            if (popupEntityId) { lpClose(); return; }
            pointerDownTime = Date.now();

            didHold = false;
            pointerDownGroup = resolveHitGroup(event);
            if (!pointerDownGroup) return;

                didHold = true;
                const info = groupToEntityInfo(pointerDownGroup);
                if (!info) return;

            if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
            if (didHold || popupEntityId) return;

            const dx = event.clientX - pointerDownPos.x, dy = event.clientY - pointerDownPos.y;
            if (elapsed > 500 || Math.sqrt(dx*dx+dy*dy) > 10) return;

            if (!parentGroup) return;
            const info = groupToEntityInfo(parentGroup);
            if (!info) return;
            const newOn = !lpIsOn(info.entityId);
            if (!haStates[info.entityId]) haStates[info.entityId] = { state: 'off', attributes: {} };
            haStates[info.entityId].state = newOn ? 'on' : 'off';
            optimisticLock[info.entityId] = Date.now();
            applyAllHAStates();
            fetch('/api/ha-service', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: info.isSwitch ? 'switch' : 'light', service: newOn ? 'turn_on' : 'turn_off', data: { entity_id: info.entityId } }) });
        });

            // Cancel hold if moved too far
            if (holdTimer) {
                const dx = event.clientX - pointerDownPos.x, dy = event.clientY - pointerDownPos.y;

            const hit = resolveHitGroup(event);

        });

        document.getElementById('btn-top').addEventListener('click', () => {
            document.getElementById('btn-bottom').classList.remove('active');
            document.getElementById('btn-top').classList.add('active');
            activeFloorMode = 'top'; targetPlaneHeight = 550; targetBottomFloorOpacity = 1.0;
            applyFloorVisibilityPipeline();
        });
        document.getElementById('btn-bottom').addEventListener('click', () => {
            document.getElementById('btn-top').classList.remove('active');
            document.getElementById('btn-bottom').classList.add('active');
            activeFloorMode = 'bottom'; targetPlaneHeight = 280; targetBottomFloorOpacity = 0.0;
            applyFloorVisibilityPipeline();
        });

        // ── Render loop ──────────────────────────────────────────────────────────

        const clock = new THREE.Clock();
        let frameDelta = 0;
        const fpsTargetBudget = 1 / 30;

        function animate() {
            requestAnimationFrame(animate);
            frameDelta += clock.getDelta();
            if (frameDelta < fpsTargetBudget) return;

            // Rainbow light hue cycling
            if (rainbowLight3d && rainbowLight3d.visible) {
                rainbowHue = (rainbowHue + 0.8) % 360;
                rainbowLight3d.color.setHSL(rainbowHue / 360, 1.0, 0.5);
            }

            if (houseCutPlane) {
                if (isMobile) {
                    houseCutPlane.constant = targetPlaneHeight;
                } else {
                    const diffHeight = targetPlaneHeight - houseCutPlane.constant;
                    if (Math.abs(diffHeight) > 0.1) houseCutPlane.constant += diffHeight * animationSpeed;
                    else houseCutPlane.constant = targetPlaneHeight;
                }
            }

            if (bottomFloorMeshesToFade.length > 0) {
                if (isMobile) {
                    currentBottomFloorOpacity = targetBottomFloorOpacity;
                    bottomFloorMeshesToFade.forEach(mesh => {
                        const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
                        mats.forEach(mat => { mat.opacity = currentBottomFloorOpacity; mat.transparent = (currentBottomFloorOpacity < 1.0); });
                        mesh.visible = (currentBottomFloorOpacity > 0);
                    });
                } else {
                    const diffOpacity = targetBottomFloorOpacity - currentBottomFloorOpacity;
                    if (Math.abs(diffOpacity) > 0.01) {
                        currentBottomFloorOpacity += diffOpacity * animationSpeed;
                        bottomFloorMeshesToFade.forEach(mesh => {
                            mesh.visible = true;
                            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
                            mats.forEach(mat => { mat.transparent = true; mat.opacity = currentBottomFloorOpacity; });
                        });
                    } else {
                        currentBottomFloorOpacity = targetBottomFloorOpacity;
                        bottomFloorMeshesToFade.forEach(mesh => {
                            const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
                            mats.forEach(mat => { mat.opacity = currentBottomFloorOpacity; mat.transparent = (currentBottomFloorOpacity < 1.0); });
                            mesh.visible = (currentBottomFloorOpacity > 0);
                        });
                    }
                }
            }

            renderer.render(scene, camera);
            frameDelta = frameDelta % fpsTargetBudget;
        }
        animate();
    </script>
    <script>
        function scaleContainer() {
            const el = document.getElementById('dashboard-container');
            const scale = Math.min(window.innerHeight / 1095, window.innerWidth / 850);
            el.style.transform = 'scale(' + scale + ')';
        }
        scaleContainer();
        window.addEventListener('resize', scaleContainer);
    </script>
</body>
</html>
